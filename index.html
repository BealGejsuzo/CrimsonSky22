<!DOCTYPE html>
<html>
<head>
    <title>TREDICT INVICTUS - HASH GENERATOR</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #0f0;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { text-align: center; color: #ff0; }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: monospace;
        }
        button {
            background: #0f0;
            color: #000;
            cursor: pointer;
            font-weight: bold;
        }
        .hash-box {
            background: #000;
            padding: 15px;
            border: 1px solid #0f0;
            word-break: break-all;
            margin: 10px 0;
            font-size: 10px;
            max-height: 200px;
            overflow: auto;
        }
        .success { color: #0f0; text-align: center; }
        .info { color: #ff0; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 TREDICT INVICTUS</h1>
        <div class="info">⚠ HASH LENGTH: 1280 KARAKTER (10x LIPAT) ⚠</div>
        <hr>
        <p>📁 Pilih file clover.js</p>
        <input type="file" id="fileInput" accept=".js">
        <p>🔑 Masukkan Password</p>
        <input type="password" id="password" placeholder="Masukkan password...">
        <button onclick="generateHash()">⚡ GENERATE HASH</button>
        <div id="result" style="display:none; margin-top: 20px;">
            <hr>
            <div class="success">✅ HASH BERHASIL DIGENERATE</div>
            <p><strong>🔐 TREDICTINVICTUS:</strong></p>
            <div class="hash-box" id="finalHash"></div>
            <p><strong>🔑 TUTORBYPASS:</strong></p>
            <div class="hash-box" id="passHash"></div>
            <p><strong>📝 COPY KE sec.js:</strong></p>
            <div class="hash-box" id="secCode"></div>
            <button onclick="copyCode()">📋 COPY</button>
        </div>
    </div>
    <script>
        async function generateHash() {
            const file = document.getElementById('fileInput').files[0];
            const password = document.getElementById('password').value;
            if (!file) { alert('Pilih file dulu!'); return; }
            if (!password) { alert('Masukkan password!'); return; }
            const encoder = new TextEncoder();
            const passData = encoder.encode(password);
            const passHashBuffer = await crypto.subtle.digest('SHA-512', passData);
            const hashedPassword = Array.from(new Uint8Array(passHashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            const fileData = await file.arrayBuffer();
            let currentHash = await crypto.subtle.digest('SHA-512', fileData);
            let hashHex = Array.from(new Uint8Array(currentHash)).map(b => b.toString(16).padStart(2, '0')).join('');
            let extremeHash = hashHex;
            for (let round = 0; round < 10; round++) {
                let xorResult = '';
                for (let i = 0; i < extremeHash.length; i++) {
                    let code = extremeHash.charCodeAt(i) ^ hashedPassword.charCodeAt(i % hashedPassword.length);
                    xorResult += String.fromCharCode(code);
                }
                const xorData = encoder.encode(xorResult);
                const newHashBuffer = await crypto.subtle.digest('SHA-512', xorData);
                extremeHash = Array.from(new Uint8Array(newHashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                extremeHash = extremeHash + hashHex.substring(0, 64);
                hashHex = extremeHash;
            }
            extremeHash = extremeHash.substring(0, 1280);
            document.getElementById('finalHash').innerHTML = extremeHash;
            document.getElementById('passHash').innerHTML = hashedPassword;
            const secCode = `// TREDICT INVICTUS SECURITY
module.exports = {
    TREDICTINVICTUS: "${extremeHash}",
    TUTORBYPASS: "${hashedPassword}"
};`;
            document.getElementById('secCode').innerText = secCode;
            document.getElementById('result').style.display = 'block';
        }
        function copyCode() {
            const code = document.getElementById('secCode').innerText;
            navigator.clipboard.writeText(code);
            alert('✅ HASH COPIED!');
        }
    </script>
</body>
</html>
